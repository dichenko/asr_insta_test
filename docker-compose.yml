services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "127.0.0.1:8000:8000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: instagram_ai
      POSTGRES_USER: instagram_ai
      POSTGRES_PASSWORD: change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
